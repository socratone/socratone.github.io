<!DOCTYPE html>
<html lang="ko">
  <!-- head -->
  <body>
    <!-- header -->
    <main class="main-body">
      <h1>React TypeScript Types</h1>

      <p>리액트 타입스크립트 개발시 자주 쓰는 타입을 정리합니다.</p>

      <h2>Children</h2>

      <p>
        children: <strong>React.ReactNode</strong>
        <span class="text--green">// 모든 타입</span>
      </p>
      <p>
        children: <strong>React.ReactChild</strong>
        <span class="text--green">// 한 엘리먼트</span>
      </p>
      <p>
        children: <strong>React.ReactChild[]</strong>
        <span class="text--green">// 둘 이상의 엘리먼트</span>
      </p>

      <h2>Event</h2>

      <p>
        event: <strong>React.MouseEvent&lt;HTMLButtonElement&gt;</strong>
        <span class="text--green">// 버튼 이벤트</span>
      </p>
    </main>
  </body>
</html>
